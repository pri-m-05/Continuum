<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Continuum</title>
    <link rel="stylesheet" href="popup.css" />
    <link rel="stylesheet" href="theme.css" />
    <script src="theme.js"></script>
  </head>
  <body>
    <div class="wrap">
      <header class="popupHeader">
        <div class="popupTitleBlock">
          <h1>Continuum</h1>
          <p id="status" class="subtle">Checking backend...</p>
        </div>

        <button
          id="themeToggleBtn"
          class="ghost theme-toggle"
          data-theme-toggle
          type="button"
        ></button>
      </header>

      <section class="card">
        <h2>Workspace</h2>
        <button id="openWorkspaceBtn">Open Side Panel</button>
        <button id="openLibraryBtn">Open Library</button>
        <button id="openSettingsBtn">Settings</button>
      </section>

      <section class="card">
        <h2>Quick Controls</h2>
        <button id="startMeetingBtn">Start Meeting</button>
        <button id="stopMeetingBtn">Stop Meeting</button>
        <div id="meetingStatus" class="subtle">Meeting status: unknown</div>
      </section>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
