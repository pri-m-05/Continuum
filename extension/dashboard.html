<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Continuum Library</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="header">
        <h1>Continuum Library</h1>
        <div class="subtle" id="backendInfo">Loading settings...</div>
      </header>

      <section class="card">
        <div class="tabs">
          <button id="tabDocs" class="tab active">Docs</button>
          <button id="tabMeetings" class="tab">Meetings</button>
        </div>

        <div class="toolbarRow">
            <input id="q" placeholder="Search..." />
            <button id="searchBtn">Search</button>
            <button id="refreshBtn" class="ghost">Recent</button>
            <button id="externalDocBtn" class="ghost">Generate from trusted sources</button>
        </div>

        <div id="docControls" class="toolbarRow toolbarRow--filters">
            <select id="docTypeFilter">
                <option value="all">All doc types</option>
                <option value="sop">SOP</option>
                <option value="walkthrough">Walkthrough</option>
                <option value="training">Training</option>
                <option value="audit">Audit</option>
            </select>

            <select id="sourceBasisFilter">
                <option value="all">All source types</option>
                <option value="internal_capture">Internal workflow</option>
                <option value="internal_draft">Internal draft</option>
                <option value="trusted_external">Trusted external</option>
                <option value="mixed">Mixed sources</option>
                <option value="community">Community source</option>
            </select>

            <select id="docSort">
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
                <option value="title_asc">Title A–Z</option>
            </select>
        </div>
      </section>

      <section class="card">
        <h2 id="listTitle">Documents</h2>
        <div id="list" class="list">Loading...</div>
      </section>

      <section class="card">
        <h2>Preview</h2>
        <div id="preview" class="list subtle">Select an item.</div>
      </section>
    </div>

    <script type="module" src="react-dist/preview.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
