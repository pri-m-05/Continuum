<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Continuum Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="wrap">
      <h1>Continuum Options</h1>

      <section class="card">
        <label for="backendBaseUrl">Backend URL</label>
        <input id="backendBaseUrl" type="text" placeholder="http://127.0.0.1:8000" />
      </section>

      <section class="card">
        <h2>Meeting minutes format</h2>
        <label for="meetingNotesStyle">Format</label>
        <select id="meetingNotesStyle">
          <option value="professional_bullets">Professional bullets</option>
          <option value="narrative">Narrative paragraph</option>
          <option value="action_items_only">Action items only</option>
        </select>
      </section>

      <section class="card">
        <h2>Required Sections</h2>
        <p>One per line.</p>
        <textarea id="requiredSections"></textarea>
      </section>

      <section class="card">
        <h2>Required Keywords</h2>
        <p>One per line.</p>
        <textarea id="requiredKeywords"></textarea>
      </section>

      <section class="card">
        <h2>Prohibited Words</h2>
        <p>One per line.</p>
        <textarea id="prohibitedWords"></textarea>
      </section>

      <section class="card">
        <label>
          <input id="captureInputValues" type="checkbox" />
          Capture safe input previews
        </label>
      </section>

      <section class="card">
        <h2>AI / Meeting Status</h2>
        <p id="aiStatusText">Checking backend AI configuration...</p>
        <button id="refreshAiStatusBtn" type="button">Refresh AI Status</button>
      </section>

      <button id="saveBtn">Save Settings</button>
      <p id="status"></p>
    </div>

    <script src="options.js"></script>
  </body>
</html>
